<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin View</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase-init.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #23a6d5; color: #fff; padding: 20px; max-width: 800px; margin: 0 auto; }
  h1 { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
  button { padding: 8px 15px; font-size: 1rem; background: #ee7752; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
  ul { list-style-type: none; padding: 0; }
  li { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
  .name { font-weight: bold; font-size: 1.2rem; }
  .cat { font-size: 0.8rem; background: #ee7752; padding: 3px 8px; border-radius: 5px; margin-left: 10px; }
  .reviews { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.2); color: #eef; font-size: 0.95rem; }
  a.back { color: #fff; text-decoration: underline; display: block; margin-top: 30px; text-align: center; }
</style>
</head>
<body>

  <h1>
    Secure Dashboard
    <button id="logoutBtn">Log out</button>
  </h1>
  
  <div id="content">Loading secure data...</div>

  <a href="index.html" class="back">Back to App</a>

  <script>
    document.getElementById('logoutBtn').addEventListener('click', () => {
      firebase.auth().signOut().then(() => {
        window.location.href = "login.html";
      });
    });

    // Force reload on "Back" button
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) { window.location.reload(); }
    });

    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        loadData();
      } else {
        window.location.href = "login.html";
      }
    });

    async function loadData() {
      try {
        db.ref('dishes').once('value').then(snapshot => {
          const dataObj = snapshot.val();
          const dishes = dataObj ? Object.values(dataObj) : [];
          const content = document.getElementById('content');
          
          if (dishes.length === 0) {
            content.innerHTML = "No submissions yet.";
            return;
          }

          // Sort so reviewed items are top
          dishes.sort((a, b) => {
            if (a.reviews && !b.reviews) return -1;
            if (!a.reviews && b.reviews) return 1;
            return 0;
          });

          let html = "<ul>";
          dishes.forEach(dish => {
            let reviewsHTML = '';
            if (dish.reviews) {
              reviewsHTML = `<div class="reviews">💬 ${dish.reviews.split(' | ').join('<br>💬 ')}</div>`;
            }
            html += `
              <li>
                <span class="name">${dish.emoji} ${dish.name}</span>
                <span class="cat">${dish.category} | Picked: ${dish.pickCount}</span>
                ${reviewsHTML}
              </li>
            `;
          });
          html += "</ul>";
          content.innerHTML = html;
        });
      } catch (err) {
        document.getElementById('content').innerHTML = "❌ Network Error.";
      }
    }
  </script>
</body>
</html>
