<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add a Dish</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #23a6d5; color: #fff; text-align: center; padding: 50px; }
  .card { background: rgba(0,0,0,0.2); padding: 30px; border-radius: 20px; display: inline-block; }
  input { padding: 10px; font-size: 1rem; border-radius: 10px; border: none; margin-bottom: 15px; }
  button { padding: 10px 20px; font-size: 1rem; background: #ee7752; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
  #greeting { margin-top: 20px; font-size: 1.5rem; font-weight: bold; }
  a { color: #fff; text-decoration: underline; display: block; margin-top: 20px; }
</style>
</head>
<body>
  <div class="card">
    <h2>Add a New Dish</h2>
    <form id="dishForm">
      <input type="text" id="dishName" placeholder="Enter dish name..." required>
      <br>
      <button type="submit">Add Dish!</button>
    </form>
    <div id="greeting"></div>
    <a href="index.html">Back to Picker</a>
  </div>
  <script>
    document.getElementById('dishForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('dishName').value;
      
      let dishes = JSON.parse(localStorage.getItem('myDishes')) || [
        { name: "Nasi Lemak", emoji: "🍚" }, { name: "Roti Canai", emoji: "🥞" },
        { name: "Laksa", emoji: "🍜" }, { name: "Satay", emoji: "🍢" },
        { name: "Mee Goreng", emoji: "🍝" }, { name: "Cendol", emoji: "🍧" },
        { name: "Rendang", emoji: "🍛" }, { name: "Teh Tarik", emoji: "☕" },
        { name: "Mee Rebus", emoji: "🍲" }, { name: "Nasi Kerabu", emoji: "🥗" }
      ];
      
      const foodEmojis = ["😋","🍽️","🥣","🔥","✨","🥘"];
      const randomEmoji = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
      dishes.push({ name: name, emoji: randomEmoji });
      localStorage.setItem('myDishes', JSON.stringify(dishes));

      document.getElementById('greeting').innerText = `Yum! Added ${name} to your list!`;
      this.reset();
    });
  </script>
</body>
</html>
