<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add a New Dish</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ee7752">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #23a6d5; color: #fff; text-align: center; padding: 50px; }
  .card { background: rgba(0,0,0,0.2); padding: 30px; border-radius: 20px; display: inline-block; }
  input { padding: 10px; font-size: 1rem; border-radius: 10px; border: none; margin-bottom: 15px; }
  button { padding: 10px 20px; font-size: 1rem; background: #ee7752; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
  #greeting { margin-top: 20px; font-size: 1.5rem; font-weight: bold; }
  a { color: #fff; text-decoration: underline; display: block; margin-top: 20px; }
</style>
</head>
<body>
  <div class="card">
    <h2>Add a New Dish</h2>
    <form id="dishForm">
      <input type="text" id="dishName" placeholder="Enter dish name..." required>
      <br>
      <select id="dishCategory" style="margin-top: 10px; width: 250px; padding: 10px; font-size: 1.2rem; border-radius: 8px;">
        <option value="Any">Category: Any</option>
        <option value="Breakfast">Breakfast</option>
        <option value="Lunch">Lunch</option>
        <option value="Dinner">Dinner</option>
        <option value="Dessert">Dessert</option>
        <option value="Drinks">Drinks</option>
        <option value="Snack">Snack</option>
      </select>
      <br>
      <select id="dishBudget" style="margin-top: 10px; width: 250px; padding: 10px; font-size: 1.2rem; border-radius: 8px;">
        <option value="Any">Budget: Any</option>
        <option value="💲">💲 Murah</option>
        <option value="💲💲">💲💲 Average</option>
        <option value="💲💲💲">💲💲💲 Mahal</option>
      </select>
      <br>
      <input type="text" id="dishEmoji" placeholder="Emoji (optional, auto-generated if blank)" maxlength="2" style="text-align: center; width: 250px; margin-top: 10px;">
      <br>
      <button type="submit" style="margin-top: 15px;">Add Dish!</button>
    </form>
    <div id="greeting"></div>
    <a href="index.html">Back to Picker</a>
  </div>
  <script>
    document.getElementById('dishForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('dishName').value;
      const emojiInput = document.getElementById('dishEmoji').value;
      const category = document.getElementById('dishCategory').value;
      const budget = document.getElementById('dishBudget').value;
      
      const allEmojis = "🍔🍟🍕🌭🥪🌮🌯🫔🥙🧆🥚🍳🥘🍲🥣🥗🍿🧈🧂🥫🍱🍘🍙🍚🍛🍜🍝🍠🍢🍣🍤🍥🥮🍡🥟🥠🥡🦀🦞🦐🦑🦪🍦🍧🍨🍩🍪🎂🍰🧁🥧🍫🍬🍭🍮🍯🍼🥛☕🫖🍵🍶🍾🍷🍸🍹🍺🍻🥂🥃🥤🧋🧃🧉🧊🥢🍽🍴🥄🔪🏺🍏🍎🍐🍊🍋🍌🍉🍇🍓🍈🍒🍑🥭🍍🥥🥝🍅🍆🥑🥦🥬🥒🌶🫑🌽🥕🧄🧅🥔🍠🥐🥯🍞🥖🥨🧀🍗🍖🥩🍤🥞🧇🍄🥜🌰🥓😋😝🤪🤩🥳🤠😇🙃🥸😎🤓🧐🥰😘😛😜🤨😍✨🔥🌟💫💥🎉🎊🎈";
      const foodEmojis = Array.from(allEmojis);
      
      const emojiMap = {
        "burger": "🍔", "pizza": "🍕", "nasi lemak": "🍚", "ayam": "🍗", "chicken": "🍗",
        "coffee": "☕", "kopi": "☕", "teh": "🍵", "tea": "🍵", "mee": "🍜", "noodle": "🍜",
        "laksa": "🍜", "sushi": "🍣", "cake": "🍰", "kek": "🍰", "roti": "🥐", "bread": "🍞",
        "satay": "🍢", "ikan": "🐟", "fish": "🐟", "salad": "🥗", "sayur": "🥗", "soup": "🍲",
        "sup": "🍲", "rice": "🍚", "nasi": "🍚", "fries": "🍟", "kentang": "🍟", "egg": "🍳",
        "telur": "🍳", "steak": "🥩", "daging": "🥩", "apple": "🍎", "epal": "🍎", "orange": "🍊",
        "jus": "🧃", "juice": "🧃", "biscuit": "🍪", "biskut": "🍪", "ice cream": "🍦", "aiskrim": "🍦",
        "susu": "🥛", "milk": "🥛", "air": "🧊", "water": "🧊", "rendang": "🍛", "curry": "🍛", "kari": "🍛"
      };

      let matchedEmoji = null;
      const lowerName = name.toLowerCase();
      for (const key in emojiMap) {
        if (lowerName.includes(key)) {
          matchedEmoji = emojiMap[key];
          break; // Stop at the first match
        }
      }

      const randomEmoji = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
      const generatedEmoji = matchedEmoji ? matchedEmoji : randomEmoji;
      const emoji = emojiInput.trim() !== "" ? emojiInput : generatedEmoji;
      
      const greetingDiv = document.getElementById('greeting');
      greetingDiv.innerText = 'Saving to database... ⏳';
      
      const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwMpuM0MoZvOO1SZvswjfAh7w49F1s4AnjEMDRucfOUXlHXogkwZhVCACF4ODB0hJhI/exec';
      
      fetch(WEB_APP_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8',
        },
        body: JSON.stringify({ action: 'add_dish', name: name, emoji: emoji, category: category, budget: budget })
      }).then(() => {
        greetingDiv.innerText = `Yum! Added ${name} to your global database!`;
        this.reset();
      }).catch(err => {
        // Google Apps Script blocks reading the response, but saves the data anyway!
        greetingDiv.innerText = `Yum! Added ${name} to your global database!`;
        document.getElementById('dishForm').reset();
      });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
