<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery & Leaderboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ee7752">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2rem;
    font-family: 'Poppins', sans-serif;
    background: #111; color: #fff; text-align: center;
  }
  h1 { font-size: 2.5rem; color: #ff9a9e; }
  .podium { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin: 3rem 0; }
  .podium-item { background: #333; padding: 20px; border-radius: 20px 20px 0 0; width: 150px; }
  .podium-1 { height: 250px; background: linear-gradient(135deg, #FFD700, #DAA520); color: #000; box-shadow: 0 -10px 30px rgba(255, 215, 0, 0.5); z-index: 2; }
  .podium-2 { height: 180px; background: linear-gradient(135deg, #C0C0C0, #A9A9A9); color: #000; }
  .podium-3 { height: 130px; background: linear-gradient(135deg, #CD7F32, #8B4513); color: #000; }
  .podium-emoji { font-size: 4rem; }
  .podium-name { font-weight: 800; font-size: 1.2rem; margin-top: 10px; }
  .podium-score { font-size: 1rem; opacity: 0.8; }
  
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 3rem; }
  .card { background: #222; padding: 20px; border-radius: 15px; border: 1px solid #444; transition: 0.3s; }
  .card:hover { transform: translateY(-5px); border-color: #ff9a9e; }
  .card-emoji { font-size: 3rem; }
  .card-name { font-weight: bold; font-size: 1.2rem; margin: 10px 0; }
  .card-cat { font-size: 0.9rem; color: #aaa; background: #333; padding: 3px 8px; border-radius: 10px; display: inline-block; }
  .card-reviews { font-size: 0.8rem; color: #ffeb3b; margin-top: 10px; }
  a.btn { color: #fff; text-decoration: none; padding: 10px 20px; background: #444; border-radius: 10px; margin-top: 20px; display: inline-block; }
</style>
</head>
<body>
  <a href="index.html" class="btn">🔙 Back to Picker</a>
  <h1>🏆 Most Picked Leaderboard</h1>
  
  <div id="loading">Loading database... ⏳</div>
  
  <div class="podium" id="podium" style="display: none;">
    <!-- Podium injected here -->
  </div>

  <h2>All Dishes Gallery</h2>
  <div class="gallery" id="gallery">
    <!-- Gallery injected here -->
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwMpuM0MoZvOO1SZvswjfAh7w49F1s4AnjEMDRucfOUXlHXogkwZhVCACF4ODB0hJhI/exec';
    
    fetch(WEB_APP_URL)
      .then(r => r.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        
        // Sort for Leaderboard
        const sorted = [...data].sort((a, b) => b.pickCount - a.pickCount);
        
        // Build Podium
        if(sorted.length >= 3) {
          document.getElementById('podium').style.display = 'flex';
          const p2 = sorted[1]; const p1 = sorted[0]; const p3 = sorted[2];
          document.getElementById('podium').innerHTML = `
            <div class="podium-item podium-2">
              <div class="podium-emoji">${p2.emoji}</div>
              <div class="podium-name">${p2.name}</div>
              <div class="podium-score">🥈 ${p2.pickCount} wins</div>
            </div>
            <div class="podium-item podium-1">
              <div class="podium-emoji">${p1.emoji}</div>
              <div class="podium-name">${p1.name}</div>
              <div class="podium-score">👑 ${p1.pickCount} wins</div>
            </div>
            <div class="podium-item podium-3">
              <div class="podium-emoji">${p3.emoji}</div>
              <div class="podium-name">${p3.name}</div>
              <div class="podium-score">🥉 ${p3.pickCount} wins</div>
            </div>
          `;
        }

        // Build Gallery
        const gallery = document.getElementById('gallery');
        const favs = JSON.parse(localStorage.getItem('nakmakan_favs') || '[]');

        data.forEach(dish => {
          let revHtml = '';
          if(dish.reviews) {
            const revList = dish.reviews.split(' | ');
            revHtml = `<div class="card-reviews">` + revList.slice(-2).join('<br>') + `</div>`; // show last 2
          }
          const isFav = favs.includes(dish.name);
          const safeName = dish.name.replace(/'/g, "\\'");
          
          gallery.innerHTML += `
            <div class="card">
              <div style="text-align: right;">
                <button onclick="toggleFav(this, '${safeName}')" style="background:none; border:none; font-size:1.5rem; cursor:pointer; padding:0; margin:0; outline:none;">
                  ${isFav ? '❤️' : '🤍'}
                </button>
              </div>
              <div class="card-emoji">${dish.emoji}</div>
              <div class="card-name">${dish.name}</div>
              <div class="card-cat">${dish.category}</div>
              <div style="font-size:0.9rem; margin-top:5px;">Picked: ${dish.pickCount}x</div>
              ${revHtml}
            </div>
          `;
        });
      });

    function toggleFav(btn, name) {
      let favs = JSON.parse(localStorage.getItem('nakmakan_favs') || '[]');
      if (favs.includes(name)) {
        favs = favs.filter(n => n !== name);
        btn.innerText = '🤍';
      } else {
        favs.push(name);
        btn.innerText = '❤️';
      }
      localStorage.setItem('nakmakan_favs', JSON.stringify(favs));
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
