<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #23a6d5; color: #fff; text-align: center; padding: 50px; }
  .card { background: rgba(0,0,0,0.2); padding: 30px; border-radius: 20px; display: inline-block; max-width: 400px; width: 100%; }
  input { padding: 12px; font-size: 1rem; border-radius: 10px; border: none; margin-bottom: 15px; width: 100%; text-align: center; box-sizing: border-box; }
  button { padding: 12px 20px; font-size: 1.1rem; background: #ee7752; color: #fff; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; box-sizing: border-box; }
  a { color: #fff; text-decoration: underline; display: block; margin-top: 20px; }
  #msg { color: #ffcccc; font-weight: bold; margin-top: 15px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <form id="loginForm">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Sign in</button>
    </form>
    <p id="msg"></p>
    <a href="index.html">Back to App</a>
  </div>

  <script>
    const URL = 'https://script.google.com/macros/s/AKfycbwMpuM0MoZvOO1SZvswjfAh7w49F1s4AnjEMDRucfOUXlHXogkwZhVCACF4ODB0hJhI/exec';
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const msg = document.getElementById('msg');
      msg.innerText = "Authenticating...";
      
      const form = this;
      const params = new URLSearchParams({
        action: "login",
        username: form.username.value,
        password: form.password.value
      });
      
      try {
        const res = await fetch(URL + "?" + params.toString());
        const data = await res.json();
        
        if (data.ok) {
          localStorage.setItem("token", data.token);
          window.location.href = "view.html";
        } else {
          msg.innerText = "❌ " + data.error;
        }
      } catch (err) {
        msg.innerText = "❌ Error connecting to server.";
      }
    });
  </script>
</body>
</html>
