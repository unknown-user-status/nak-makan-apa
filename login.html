<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase-init.js"></script>
<style>
  body { font-family: 'Poppins', sans-serif; background: #23a6d5; color: #fff; text-align: center; padding: 50px; }
  .card { background: rgba(0,0,0,0.2); padding: 30px; border-radius: 20px; display: inline-block; max-width: 400px; width: 100%; }
  input { padding: 12px; font-size: 1rem; border-radius: 10px; border: none; margin-bottom: 15px; width: 100%; text-align: center; box-sizing: border-box; }
  button { padding: 12px 20px; font-size: 1.1rem; background: #ee7752; color: #fff; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; box-sizing: border-box; }
  a { color: #fff; text-decoration: underline; display: block; margin-top: 20px; }
  #msg { color: #ffcccc; font-weight: bold; margin-top: 15px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Admin Sign In</h1>
    <p style="font-size: 0.9rem; margin-bottom: 20px;">Use your Firebase Email/Password to access the dashboard.</p>
    <form id="loginForm">
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Sign in</button>
    </form>
    <p id="msg"></p>
    <a href="index.html">Back to App</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const msg = document.getElementById('msg');
      msg.innerText = "Authenticating...";
      
      const email = this.email.value;
      const password = this.password.value;
      
      firebase.auth().signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          window.location.href = "view.html";
        })
        .catch((error) => {
          msg.innerText = "❌ " + error.message;
        });
    });
  </script>
</body>
</html>
