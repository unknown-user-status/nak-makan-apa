<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nak Makan Apa?</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ee7752">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase-init.js"></script>
<script src="knowledgeDB.js"></script>
<style>
  * { box-sizing: border-box; }
  
  :root {
    --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    --card-bg: rgba(255, 255, 255, 0.1);
    --text-color: #ffffff;
    --btn-bg: #ffeb3b;
    --btn-hover: #ffd600;
    --select-bg: rgba(255, 255, 255, 0.2);
    --select-color: #ffffff;
  }

  body.dark-mode {
    --bg-gradient: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
    --card-bg: rgba(255, 255, 255, 0.05);
    --text-color: #f1f1f1;
    --btn-bg: #bb86fc;
    --btn-hover: #9965f4;
    --select-bg: rgba(0, 0, 0, 0.5);
    --select-color: #ffffff;
  }

  body {
    margin: 0; padding: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-gradient);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: var(--text-color);
    transition: background 0.5s ease;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .theme-toggle {
    position: absolute; top: 20px; right: 20px;
    background: var(--card-bg); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 50px; padding: 8px 15px; cursor: pointer; color: var(--text-color);
    font-weight: bold; backdrop-filter: blur(5px);
  }

  .card {
    background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px;
    padding: 3rem 2rem; text-align: center;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    max-width: 90%; width: 500px;
  }

  h1 {
    font-size: 2.5rem; margin-top: 0; margin-bottom: 1rem;
    line-height: 1.2; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
    .filters {
      display: flex; gap: 10px; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; align-items: center;
    }
    select {
      appearance: none; -webkit-appearance: none;
      padding: 12px 40px 12px 15px; font-size: 1.1rem; border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background-color: var(--select-bg);
      background-image: url('data:image/svg+xml;utf8,<svg fill="%23ffffff" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat; background-position: right 10px center; background-size: 20px;
      color: var(--select-color); outline: none; font-weight: 600;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    select:hover, select:focus {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      border-color: rgba(255, 255, 255, 0.5);
    }
    body:not(.dark-mode) select {
      border: 2px solid rgba(0, 0, 0, 0.1);
      background-image: url('data:image/svg+xml;utf8,<svg fill="%23333333" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
    }
    body:not(.dark-mode) select:hover, body:not(.dark-mode) select:focus {
      border-color: rgba(0, 0, 0, 0.3);
    }
    
    .nearby-toggle {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      background: var(--select-bg); color: var(--select-color);
      padding: 12px 18px; border-radius: 12px; font-size: 1.1rem; font-weight: 600;
      border: 2px solid rgba(255,255,255,0.2); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .nearby-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      border-color: rgba(255, 255, 255, 0.5);
    }
    body:not(.dark-mode) .nearby-toggle {
      border: 2px solid rgba(0, 0, 0, 0.1);
    }
    body:not(.dark-mode) .nearby-toggle:hover {
      border-color: rgba(0, 0, 0, 0.3);
    }
    
    .shake-btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white; border: none; border-radius: 12px; padding: 12px 18px;
      font-size: 1.1rem; font-weight: bold; cursor: pointer;
      box-shadow: 0 4px 15px rgba(245,87,108,0.3); transition: transform 0.2s;
    }
    .shake-btn:hover { transform: scale(1.05); }

  button.spin-btn {
    font-size: 1.2rem; padding: 1rem 2rem; border: none; border-radius: 50px;
    background: var(--btn-bg); color: #333; font-weight: 800; cursor: pointer;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; width: 100%;
  }
  button.spin-btn:hover { background: var(--btn-hover); transform: scale(1.05); }
  
  #result {
    font-size: 3rem; margin-top: 1.5rem; font-weight: 800;
    min-height: 150px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .dish-name { text-shadow: 2px 2px 8px rgba(0,0,0,0.4); }
  .dish-emoji { font-size: 5rem; margin-top: 10px; }

  .action-btns {
    margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
  }
  .maps-btn {
    padding: 12px 24px; background: white; color: #333; text-decoration: none;
    border-radius: 50px; font-weight: bold; font-size: 1.1rem;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s; border: none; cursor:pointer;
  }
  .maps-btn:hover { transform: translateY(-3px); }
  .whatsapp { background: #25D366; color: white; }
  .blacklist { background: #ff4757; color: white; }
  
  .nav-links a {
    color: var(--text-color); text-decoration: none; font-size: 1.1rem; margin: 0 5px; opacity: 0.9;
  }
  .nav-links a:hover { text-decoration: underline; opacity: 1; }

  .winner-anim { animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Floating AI Chef */
  .chef-fab {
    position: fixed; bottom: 30px; right: 30px;
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, #bb86fc 0%, #7c4dff 100%);
    color: white; font-size: 2rem; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 25px rgba(124, 77, 255, 0.5);
    cursor: pointer; z-index: 1000; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .chef-fab:hover { transform: scale(1.1) rotate(10deg); }
  
  .chef-window {
    position: fixed; bottom: 100px; right: 30px;
    width: 300px; background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
    padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    z-index: 999; display: none; flex-direction: column; gap: 15px;
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌗 Dark Mode</button>

  <!-- AI Chef Recipe Modal -->
  <div id="recipeModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#1e1e1e; padding:30px; border-radius:20px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; border:2px solid #ff9a9e; position:relative;">
      <button onclick="document.getElementById('recipeModal').style.display='none'" style="position:absolute; top:15px; right:20px; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">✖</button>
      <h2 style="color:#ff9a9e; margin-top:0;">👨‍🍳 The AI Chef's Recipe</h2>
      <div id="recipeContent" style="text-align:left; line-height:1.6;">Loading...</div>
    </div>
  </div>

  <div class="card">
    <h1>🤔 Nak Makan Apa?</h1>
    
    <div class="filters">
      <select id="categoryFilter">
        <option value="Any">All Categories</option>
        <option value="Favorites">⭐ My Favorites</option>
        <option value="Nasi">🍚 Nasi</option>
        <option value="Mee">🍜 Mee</option>
        <option value="Fast Food">🍔 Fast Food</option>
        <option value="Western">🥩 Western</option>
        <option value="Sup">🍲 Sup</option>
        <option value="Drinks">🥤 Drinks</option>
        <option value="Dessert">🍨 Dessert</option>
      </select>
    </div>

    <button onclick="startRoulette()" id="spinBtn" class="spin-btn">
      🎰 Spin the Wheel!
    </button>

    <div id="result">
      <div style="font-size: 1.5rem; opacity: 0.8;">Press Spin or Ask the Chef!</div>
    </div>
    <div id="actionContainer" class="action-btns" style="display: none;"></div>

    <nav style="margin-top: 2rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
      <a href="index.html" style="color: #fff; font-weight: 800; text-decoration: underline;">🏠 Home</a> |
      <a href="list.html" style="color: #fff; text-decoration: none;">🖼️ Gallery</a> |
      <a href="swipe.html" style="color: #fff; text-decoration: none;">❤️ Swipe</a> |
      <a href="room.html" style="color: #fff; text-decoration: none;">⚔️ Room</a> |
      <a href="slots.html" style="color: #fff; text-decoration: none;">🎰 Slots</a> |
      <a href="stats.html" style="color: #fff; text-decoration: none;">📈 Stats</a> |
      <a href="login.html" style="color: #fff; text-decoration: none;">🔒 Admin</a>
    </nav>

    <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
      <button class="shake-btn" id="shakeBtn" onclick="toggleShake()" style="width: 100%; max-width: 300px; margin: 0 auto; display: block; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">📳 Enable Shake-to-Spin</button>
    </div>
  </div>

  <!-- Floating AI Chef UI -->
  <div class="chef-fab" onclick="toggleChef()">🤖</div>
  <div class="chef-window" id="chefWindow">
    <div style="font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
      🤖 The Virtual Chef
    </div>
    <div style="font-size: 0.9rem; opacity: 0.8;">
      Tell me what you are craving, or what your budget is, and I'll spin the wheel for you!
    </div>
    <input type="text" id="chefInput" placeholder="e.g., Nasi, Murah, Western..." style="width: 100%; padding: 12px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); background: var(--select-bg); color: var(--text-color); outline: none; font-family: inherit;">
    <button onclick="askChef()" style="background: linear-gradient(135deg, #bb86fc 0%, #7c4dff 100%); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: transform 0.2s; width: 100%;">Ask Chef</button>
    <button onclick="suggestByWeather(event)" style="background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: transform 0.2s; width: 100%;">⛅ Suggest by Weather</button>
  </div>

  <script>
    // Theme Logic
    const savedTheme = localStorage.getItem('nakmakan_theme');
    if (savedTheme === 'dark') document.body.classList.add('dark-mode');
    
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('nakmakan_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    function toggleChef() {
      const w = document.getElementById('chefWindow');
      if (w.style.display === 'flex') {
        w.style.display = 'none';
      } else {
        w.style.display = 'flex';
        document.getElementById('chefInput').focus();
      }
    }

    let allDishes = [];
    let isSpinning = false;

    function renderNutrition(foodName, category) {
      const stats = getKnowledge(foodName, category);
      const aiDiv = document.getElementById('aiStats');
      aiDiv.innerHTML = `
        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-top: 15px; border: 2px solid #a25afd; animation: popIn 0.5s ease-out forwards;">
          <div style="color: #ffeb3b; font-weight: bold; margin-bottom: 5px;">Health Score: ${stats.healthScore}/10</div>
          <div style="display: flex; justify-content: space-around; font-size: 0.85rem; margin-bottom: 10px;">
            <span>🔥 ${stats.calories} kcal</span>
            <span>🥩 ${stats.protein}</span>
            <span>🍞 ${stats.carbs}</span>
            <span>🥑 ${stats.fats}</span>
          </div>
          <div style="font-style: italic; color: #ccc;">"${stats.comment}"</div>
        </div>
      `;
    }

    function showRecipe(foodName, category) {
      const stats = getKnowledge(foodName, category);
      document.getElementById('recipeModal').style.display = 'flex';
      document.getElementById('recipeContent').innerHTML = stats.recipe;
    }

    function getAvgRating(reviewsStr) {
      if (!reviewsStr) return 'No reviews yet';
      const reviews = reviewsStr.split(' | ');
      let sum = 0;
      let count = 0;
      reviews.forEach(r => {
        const starStr = r.split('⭐')[0];
        const val = parseInt(starStr);
        if (!isNaN(val)) { sum += val; count++; }
      });
      if (count === 0) return 'No reviews yet';
      const avg = (sum / count).toFixed(1);
      return `⭐ ${avg} (${count} review${count>1?'s':''})`;
    }

    // Fetch dishes
    db.ref('dishes').once('value').then(snapshot => {
      const data = snapshot.val();
      if (data) {
        allDishes = Object.values(data);
      }
    }).catch(err => console.error("Error loading dishes:", err));

    // Force reload if user clicks the browser "Back" button
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) { window.location.reload(); }
    });

    // Audio Context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playClickSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }
    
    function playWinSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    // Blacklist Logic
    function blacklistDish(dishName) {
      let bl = JSON.parse(localStorage.getItem('nakmakan_blacklist') || '{}');
      // Set expiry to 24 hours from now
      bl[dishName] = Date.now() + (24 * 60 * 60 * 1000);
      localStorage.setItem('nakmakan_blacklist', JSON.stringify(bl));
      alert(`🚫 ${dishName} won't show up for the next 24 hours! Spin again.`);
      document.getElementById('actionContainer').style.display = 'none';
      document.getElementById('result').innerHTML = '<div style="font-size: 1.5rem; font-weight: normal; opacity: 0.8;">Click to spin again!</div>';
    }

    function getValidDishes() {
      // 1. Clean up expired blacklist
      let bl = JSON.parse(localStorage.getItem('nakmakan_blacklist') || '{}');
      let now = Date.now();
      for (let key in bl) {
        if (bl[key] < now) delete bl[key];
      }
      localStorage.setItem('nakmakan_blacklist', JSON.stringify(bl));

      // 2. Filter Dishes
      const cat = document.getElementById('categoryFilter').value;
      const favs = JSON.parse(localStorage.getItem('nakmakan_favs') || '[]');

      return allDishes.filter(d => {
        // Check Blacklist
        if (bl[d.name]) return false;
        
        // Check Favorites
        if (cat === 'Favorites' && !favs.includes(d.name)) return false;
        
        // Check Category (Smart Match on Category or Name)
        if (cat !== 'Favorites' && cat !== 'Any') {
          const searchCat = cat.toLowerCase();
          const dCat = (d.category || "").toLowerCase();
          const dName = (d.name || "").toLowerCase();
          
          // Match if the category exactly/partially matches, or if the food name contains the category (e.g. "Nasi")
          if (!dCat.includes(searchCat) && !dName.includes(searchCat)) {
            return false;
          }
        }

        return true;
      });
    }

    function askChef() {
      const originalQ = document.getElementById('chefInput').value.toLowerCase().trim();
      if (!originalQ || allDishes.length === 0) return;

      // Map keywords to exact budget targets
      let targetBudget = null;
      if (originalQ.includes('murah') || originalQ.includes('cheap')) targetBudget = '💲';
      else if (originalQ.includes('mahal') || originalQ.includes('expensive')) targetBudget = '💲💲💲';
      else if (originalQ.includes('average') || originalQ.includes('biasa')) targetBudget = '💲💲';

      // Clean up blacklist
      let bl = JSON.parse(localStorage.getItem('nakmakan_blacklist') || '{}');
      let now = Date.now();
      for (let key in bl) { if (bl[key] < now) delete bl[key]; }

      // Search all dishes, ignore dropdown filters, but respect blacklist
      const matches = allDishes.filter(d => {
        if (bl[d.name]) return false;
        
        if (targetBudget) {
            // If budget is requested, it MUST strictly match
            if (d.budget !== targetBudget) return false;
            
            // Remove the budget keyword from query to see if they also asked for a specific food (e.g., "nasi murah")
            const cleanQ = originalQ.replace(/(murah|cheap|mahal|expensive|average|biasa)/g, '').trim();
            if (cleanQ === '') return true; // Only asked for budget, so all matching budgets are fine
            
            return d.name.toLowerCase().includes(cleanQ) || d.category.toLowerCase().includes(cleanQ);
        } else {
            // Normal search without budget keywords
            return d.name.toLowerCase().includes(originalQ) || d.category.toLowerCase().includes(originalQ);
        }
      });

      if (matches.length > 0) {
        const winner = matches[Math.floor(Math.random() * matches.length)];
        
        document.getElementById('chefInput').value = '';
        document.getElementById('chefWindow').style.display = 'none'; // Close chat window
        
        isSpinning = true;
        document.getElementById('spinBtn').style.opacity = '0.5';
        document.getElementById('actionContainer').style.display = 'none';
        const resultDiv = document.getElementById('result');

        let ticks = 0;
        const maxTicks = 20;
        const spinInterval = setInterval(() => {
          const r = allDishes[Math.floor(Math.random() * allDishes.length)];
          resultDiv.innerHTML = `<div class="dish-name" style="font-size: 3rem;">${r.name}</div><div class="dish-emoji">${r.emoji}</div>`;
          playClickSound();
          if (navigator.vibrate) navigator.vibrate(20);
          ticks++;
          
          if (ticks >= maxTicks) {
            clearInterval(spinInterval);
            isSpinning = false;
            document.getElementById('spinBtn').style.opacity = '1';
            
            const ratingStr = getAvgRating(winner.reviews);
            resultDiv.innerHTML = `
              <div style="color:#bb86fc; font-weight:bold; font-size:1.2rem;">🤖 The Chef Recommends:</div>
              <div class="dish-name winner-anim" style="color: var(--text-color); font-size: 3.5rem;">${winner.name}</div>
              <div class="dish-emoji winner-anim">${winner.emoji}</div>
              <div class="winner-anim" style="color: #ffeb3b; font-size: 1.2rem; font-weight: bold; margin-top: 10px;">${ratingStr}</div>
              <div id="aiStats" style="margin-top: 20px; font-size: 0.9rem; color: #a25afd;"></div>
            `;
            
            renderNutrition(winner.name, winner.category);
            
            playWinSound();
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42'] });
            
            let mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(winner.name + ' near me')}`;
            document.getElementById('actionContainer').style.display = 'flex';
            document.getElementById('actionContainer').innerHTML = `
              <a href="${mapsUrl}" target="_blank" class="maps-btn">📍 Find Nearby</a>
              <button onclick="showRecipe('${winner.name}', '${winner.category}')" class="maps-btn" style="background:#ff9a9e; color:#1e1e1e; font-weight:bold;">👨‍🍳 Get Recipe</button>
              <a href="https://food.grab.com/my/en/restaurants?search=${encodeURIComponent(winner.name)}" target="_blank" class="maps-btn" style="background:#00B14F; color:white;">🟢 GrabFood</a>
              <a href="https://www.foodpanda.my/restaurants/new?q=${encodeURIComponent(winner.name)}" target="_blank" class="maps-btn" style="background:#D70F64; color:white;">🐼 FoodPanda</a>
              <button onclick="blacklistDish('${winner.name}')" class="maps-btn blacklist" style="width:100%;">Not Today 🚫</button>
            `;
          }
        }, 100);
      } else {
        alert("The Chef couldn't find a match for that. Try something else!");
      }
    }

    async function startRoulette() {
      if (isSpinning) return;
      if (allDishes.length === 0) {
        document.getElementById('result').innerHTML = '<div style="font-size: 1.5rem;">Loading dishes... Please wait! ⏳</div>';
        return;
      }

      const validDishes = getValidDishes();
      
      if (validDishes.length === 0) {
        document.getElementById('result').innerHTML = `<div style="font-size: 1.5rem;">No dishes match your filters! 😢</div>`;
        return;
      }

      isSpinning = true;
      document.getElementById('spinBtn').style.opacity = '0.5';
      document.getElementById('actionContainer').style.display = 'none';
      const resultDiv = document.getElementById('result');

      let ticks = 0;
      const maxTicks = 30;
      let delay = 50;

      function spinStep() {
        playClickSound();
        if (navigator.vibrate) navigator.vibrate(20);
        
        const random = validDishes[Math.floor(Math.random() * validDishes.length)];
        resultDiv.innerHTML = `
          <div class="dish-name" style="opacity: 0.7;">${random.name}</div>
          <div class="dish-emoji" style="opacity: 0.7; font-size: 4rem;">${random.emoji}</div>
        `;

        ticks++;
        if (ticks < maxTicks) {
          delay += 10;
          setTimeout(spinStep, delay);
        } else {
          // Winner!
          playWinSound();
          if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
          confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42'] });
          
          const winner = validDishes[Math.floor(Math.random() * validDishes.length)];
          const ratingStr = getAvgRating(winner.reviews);
          resultDiv.innerHTML = `
            <div class="dish-name winner-anim" style="color: var(--text-color); font-size: 3.5rem;">${winner.name}</div>
            <div class="dish-emoji winner-anim">${winner.emoji}</div>
            <div class="winner-anim" style="color: #ffeb3b; font-size: 1.2rem; font-weight: bold; margin-top: 10px;">${ratingStr}</div>
            <div id="aiStats" style="margin-top: 20px; font-size: 0.9rem; color: #a25afd;"></div>
          `;
          
          renderNutrition(winner.name, winner.category);
          
          let mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(winner.name + ' near me')}`;

          document.getElementById('actionContainer').style.display = 'flex';
          document.getElementById('actionContainer').innerHTML = `
            <a href="${mapsUrl}" target="_blank" class="maps-btn">📍 Find Nearby</a>
            <button onclick="showRecipe('${winner.name}', '${winner.category}')" class="maps-btn" style="background:#ff9a9e; color:#1e1e1e; font-weight:bold;">👨‍🍳 Get Recipe</button>
            <a href="https://food.grab.com/my/en/restaurants?search=${encodeURIComponent(winner.name)}" target="_blank" class="maps-btn" style="background:#00B14F; color:white;">🟢 GrabFood</a>
            <a href="https://www.foodpanda.my/restaurants/new?q=${encodeURIComponent(winner.name)}" target="_blank" class="maps-btn" style="background:#D70F64; color:white;">🐼 FoodPanda</a>
            <a href="https://api.whatsapp.com/send?text=${encodeURIComponent('The magic wheel has spoken! We are having *' + winner.name + '* ' + winner.emoji + ' tonight! Who is in? \n\nSpin your own: https://unknown-user-status.github.io/nak-makan-apa/')}" target="_blank" class="maps-btn whatsapp" style="width:100%;">💬 Invite</a>
            <button onclick="blacklistDish('${winner.name}')" class="maps-btn blacklist" style="width:100%;">Not Today 🚫</button>
          `;
          
          isSpinning = false;
          document.getElementById('spinBtn').style.opacity = '1';
        }
      }
      setTimeout(spinStep, delay);
    }
    
    // Task 5: Local Notifications
    if ('Notification' in window) {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          // Check every minute if it's lunch or dinner time
          setInterval(() => {
            const now = new Date();
            const hours = now.getHours();
            const mins = now.getMinutes();
            // 12:30 PM or 7:30 PM (19:30)
            if ((hours === 12 && mins === 30) || (hours === 19 && mins === 30)) {
              new Notification("🍽️ Nak Makan Apa?", {
                body: "It's time to eat! Spin the wheel to decide your meal! 🍔",
                icon: "icon.svg"
              });
            }
          }, 60000);
        }
      });
    }

    // --- V4 Premium Features: Shake & Weather ---
    
    // 1. Shake-to-Spin
    let shakeEnabled = false;
    let lastShakeTime = 0;

    async function toggleShake() {
      const btn = document.getElementById('shakeBtn');
      if (shakeEnabled) {
        shakeEnabled = false;
        btn.innerText = '📳 Enable Shake-to-Spin';
        btn.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
        window.removeEventListener('devicemotion', handleMotion);
        return;
      }

      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
          const permission = await DeviceMotionEvent.requestPermission();
          if (permission === 'granted') activateShake(btn);
          else alert('Permission to use accelerometer was denied.');
        } catch (e) {
          alert('Shake is not supported or permission denied on this device.');
        }
      } else {
        activateShake(btn); // Android/older iOS
      }
    }

    function activateShake(btn) {
      shakeEnabled = true;
      btn.innerText = '🛑 Disable Shake-to-Spin';
      btn.style.background = 'linear-gradient(135deg, #ff4757 0%, #c0392b 100%)';
      window.addEventListener('devicemotion', handleMotion);
    }

    function handleMotion(event) {
      if (!shakeEnabled || isSpinning) return;
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;
      const mag = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);
      
      // Gravity is ~9.8, so >22 is a strong shake
      if (mag > 22) {
        const now = Date.now();
        if (now - lastShakeTime > 2000) {
          lastShakeTime = now;
          startRoulette();
        }
      }
    }

    // 2. Weather-Smart AI Chef
    async function suggestByWeather(e) {
      const btn = e.target;
      const originalText = btn.innerText;
      btn.innerText = '⛅ Checking Weather...';
      
      try {
        const pos = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000 });
        });
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
        const wData = await wRes.json();
        const code = wData.current_weather.weathercode;
        const temp = wData.current_weather.temperature;

        // WMO Codes: 51+ means rain/snow/thunder
        let suggestion = '';
        if (code >= 51 && code <= 99) {
            suggestion = 'sup';
            alert(`It's raining or bad weather (${temp}°C)! 🌧️\nThe Chef is spinning for hot comforting food!`);
        } else if (temp > 32) {
            suggestion = 'air';
            alert(`It's blazing hot outside (${temp}°C)! ☀️\nThe Chef is spinning for cold drinks or dessert!`);
        } else {
            alert(`The weather is nice (${temp}°C)! 🌤️\nThe Chef says you can eat anything today!`);
            suggestion = ''; // Pick anything
        }
        
        document.getElementById('chefInput').value = suggestion;
        askChef();
      } catch (err) {
        alert("Couldn't get your location to check the weather. Please enable GPS!");
      }
      btn.innerText = originalText;
    }

    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('ServiceWorker registration successful');
          })
          .catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
