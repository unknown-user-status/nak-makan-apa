<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ee7752">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0; padding: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: #fff;
  }
  .card {
    background: rgba(255, 255, 255, 0.1); padding: 2rem; border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 400px;
  }
  select, input, button {
    width: 100%; padding: 10px; margin-top: 15px; border-radius: 10px; border: none; font-size: 1rem;
  }
  button {
    background: #ffeb3b; color: #333; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.3s;
  }
  button:hover { background: #ffd600; transform: scale(1.05); }
</style>
</head>
<body>
  <div class="card">
    <h1>⭐ Rate a Dish</h1>
    <form id="reviewForm">
      <select id="dishSelect" required>
        <option value="">Loading dishes... ⏳</option>
      </select>
      
      <select id="dishRating" required>
        <option value="5">⭐⭐⭐⭐⭐ (Amazing)</option>
        <option value="4">⭐⭐⭐⭐ (Great)</option>
        <option value="3">⭐⭐⭐ (Good)</option>
        <option value="2">⭐⭐ (Okay)</option>
        <option value="1">⭐ (Bad)</option>
      </select>

      <input type="text" id="dishComment" placeholder="Write a short comment..." required maxlength="50">
      
      <label style="margin-top:15px; display:block; font-size:0.9rem; opacity:0.8; text-align:left;">Attach a Photo (Optional):</label>
      <input type="file" id="dishPhoto" accept="image/*" style="background: rgba(0,0,0,0.2); color:#fff; padding: 10px; margin-top:5px;">
      
      <button type="submit" style="margin-top:20px;">Submit Review!</button>
    </form>
    <div id="status" style="margin-top:15px; font-weight:bold;"></div>
    <br>
    <a href="index.html" style="color:#fff;">Back to Picker</a>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwMpuM0MoZvOO1SZvswjfAh7w49F1s4AnjEMDRucfOUXlHXogkwZhVCACF4ODB0hJhI/exec';
    
    fetch(WEB_APP_URL)
      .then(r => r.json())
      .then(data => {
        const sel = document.getElementById('dishSelect');
        sel.innerHTML = '<option value="">-- Choose a dish --</option>';
        data.forEach(d => {
          sel.innerHTML += `<option value="${d.name}">${d.emoji} ${d.name}</option>`;
        });
      });

    document.getElementById('reviewForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('dishSelect').value;
      const rating = document.getElementById('dishRating').value;
      const comment = document.getElementById('dishComment').value;
      const photoFile = document.getElementById('dishPhoto').files[0];
      
      document.getElementById('status').innerText = "Submitting review... ⏳";
      
      let photoBase64 = null;
      if (photoFile) {
        photoBase64 = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.readAsDataURL(photoFile);
        });
      }
      
      fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'add_review', name: name, rating: rating, comment: comment, photoBase64: photoBase64 })
      }).then(() => {
        document.getElementById('status').innerText = `✅ Review saved for ${name}!`;
        e.target.reset();
      }).catch(err => {
        document.getElementById('status').innerText = `✅ Review saved for ${name}!`;
        e.target.reset();
      });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
