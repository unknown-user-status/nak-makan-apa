<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Food Swipe</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  body {
    margin: 0; padding: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; height: 100vh;
    font-family: 'Poppins', sans-serif; background: #1a1a2e; color: #fff; overflow: hidden;
  }
  
  .top-bar {
    position: absolute; top: 20px; left: 20px; z-index: 100;
  }
  .back-btn {
    color: #ccc; text-decoration: none; font-weight: 600; font-size: 1.1rem;
    background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; backdrop-filter: blur(10px);
  }

  .header-text {
    text-align: center; margin-top: 60px; margin-bottom: 20px;
  }
  .header-text h1 { font-size: 2.2rem; margin: 0; color: #ff9a9e; }
  .header-text p { color: #ccc; margin: 5px 0 0 0; font-size: 1rem; }

  .card-container {
    position: relative; width: 85vw; max-width: 350px; height: 55vh; max-height: 480px; min-height: 350px;
  }
  .swipe-card {
    position: absolute; width: 100%; height: 100%;
    background: #16213e; border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s;
    user-select: none; touch-action: none; cursor: grab; overflow: hidden;
  }
  .swipe-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.2) 100%);
    pointer-events: none;
  }
  .swipe-card.dragging { transition: none; cursor: grabbing; }
  .emoji { font-size: 8rem; margin-bottom: 20px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3)); z-index: 1; }
  .name { font-size: 2.2rem; font-weight: 800; text-align: center; padding: 0 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); z-index: 1; line-height: 1.2; }
  .budget { margin-top: 20px; color: #ff9a9e; font-weight: bold; font-size: 1.3rem; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 50px; z-index: 1; }
  
  .controls { margin-top: 30px; display: flex; gap: 30px; z-index: 10; margin-bottom: 30px; }
  .btn-reject, .btn-accept {
    border: none; border-radius: 50%; width: 75px; height: 75px; font-size: 2.5rem; 
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-reject { background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%); box-shadow: 0 10px 20px rgba(255,71,87,0.4); color: white; }
  .btn-accept { background: linear-gradient(135deg, #2ed573 0%, #7bed9f 100%); box-shadow: 0 10px 20px rgba(46,213,115,0.4); color: white; }
  .btn-reject:active, .btn-accept:active { transform: scale(0.9); box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
  
  .winner-screen { display: none; text-align: center; z-index: 20; padding: 20px; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: #1a1a2e; justify-content: center; flex-direction: column; align-items: center; }
  .maps-btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; color: #fff; margin-top: 10px; font-size: 1.2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.3s; width: 100%; max-width: 300px; }
  .maps-btn:hover { transform: translateY(-3px); }
  .grab-btn { background: #00B14F; }
  .panda-btn { background: #D70F64; }
</style>
</head>
<body>
  
  <div class="top-bar">
    <a href="index.html" class="back-btn">🔙 Back</a>
  </div>

  <div id="gameUI" style="display:flex; flex-direction:column; align-items:center; width:100%;">
    <div class="header-text">
      <h1>Swipe to Eat!</h1>
      <p>Swipe Right 💚 to Eat, Swipe Left ❌ to Pass</p>
    </div>
    
    <div class="card-container" id="cardContainer">
      <div style="text-align:center; margin-top:150px; font-size: 1.5rem;">Loading dishes... ⏳</div>
    </div>

    <div class="controls">
      <button class="btn-reject" onclick="swipeAction('left')">❌</button>
      <button class="btn-accept" onclick="swipeAction('right')">💚</button>
    </div>
  </div>

  <div id="winnerScreen" class="winner-screen">
    <h1 style="color: #ff9a9e; font-size: 2.5rem; margin-top: 0;">Your Dinner is Served!</h1>
    <div id="winnerDetails" style="font-size: 8rem; margin: 20px 0; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));"></div>
    <div id="winnerName" style="font-size: 3rem; font-weight: 800; color: #ffeb3b; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); line-height: 1.2; margin-bottom: 30px; padding: 0 10px;"></div>
    
    <div id="actionContainer" style="display:flex; flex-direction:column; gap:15px; width: 100%; max-width: 350px;"></div>
    <br><br>
    <a href="swipe.html" style="color: #ccc; text-decoration: none; font-size: 1.2rem; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px;">🔄 Play Again</a>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwMpuM0MoZvOO1SZvswjfAh7w49F1s4AnjEMDRucfOUXlHXogkwZhVCACF4ODB0hJhI/exec';
    let dishes = [];
    let currentIndex = 0;

    fetch(WEB_APP_URL, { cache: 'no-store' })
      .then(r => r.json())
      .then(data => {
        if (data && data.length > 0) {
          dishes = data.sort(() => Math.random() - 0.5);
          renderCards();
        }
      });

    function renderCards() {
      const container = document.getElementById('cardContainer');
      container.innerHTML = '';
      
      for (let i = Math.min(currentIndex + 2, dishes.length - 1); i >= currentIndex; i--) {
        const d = dishes[i];
        const card = document.createElement('div');
        card.className = 'swipe-card';
        card.id = `card-${i}`;
        card.innerHTML = `
          <div class="emoji">${d.emoji}</div>
          <div class="name">${d.name}</div>
          <div class="budget">${d.budget || '💲'}</div>
        `;
        
        if (i === currentIndex) {
          makeDraggable(card);
        } else {
          const offset = (i - currentIndex) * 15;
          card.style.transform = `scale(${1 - (i-currentIndex)*0.08}) translateY(${offset}px)`;
        }
        container.appendChild(card);
      }
      if (currentIndex >= dishes.length) {
        container.innerHTML = '<div style="text-align:center; margin-top:150px;"><h2>No more dishes! 😢</h2><br><a href="swipe.html" style="color:#ff9a9e; font-size:1.2rem;">🔄 Restart</a></div>';
      }
    }

    function makeDraggable(card) {
      let startX = 0, currentX = 0;
      
      const onStart = (e) => {
        startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
        card.classList.add('dragging');
      };
      
      const onMove = (e) => {
        if (!startX) return;
        currentX = (e.type.includes('mouse') ? e.pageX : e.touches[0].pageX) - startX;
        const rotate = currentX * 0.1;
        card.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;
        
        if (currentX > 50) {
            card.style.background = 'linear-gradient(135deg, #16213e 0%, #2ed573 100%)';
        } else if (currentX < -50) {
            card.style.background = 'linear-gradient(135deg, #16213e 0%, #ff4757 100%)';
        } else {
            card.style.background = '#16213e';
        }
      };
      
      const onEnd = () => {
        if (!startX) return;
        card.classList.remove('dragging');
        if (currentX > 100) swipeAction('right');
        else if (currentX < -100) swipeAction('left');
        else {
          card.style.transform = '';
          card.style.background = '#16213e';
        }
        startX = 0; currentX = 0;
      };

      card.addEventListener('mousedown', onStart);
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onEnd);
      
      card.addEventListener('touchstart', onStart);
      window.addEventListener('touchmove', onMove);
      window.addEventListener('touchend', onEnd);
    }

    function swipeAction(direction) {
      const card = document.getElementById(`card-${currentIndex}`);
      if (!card) return;
      
      card.style.transition = 'transform 0.5s, opacity 0.5s';
      if (direction === 'left') {
        card.style.transform = 'translateX(-1000px) rotate(-30deg)';
        card.style.opacity = '0';
        if (navigator.vibrate) navigator.vibrate(50);
        setTimeout(() => {
          currentIndex++;
          renderCards();
        }, 300);
      } else {
        card.style.transform = 'translateX(1000px) rotate(30deg)';
        card.style.opacity = '0';
        setTimeout(() => {
          showWinner(dishes[currentIndex]);
        }, 300);
      }
    }

    function showWinner(winner) {
      document.getElementById('gameUI').style.display = 'none';
      const wScreen = document.getElementById('winnerScreen');
      wScreen.style.display = 'flex';
      
      document.getElementById('winnerDetails').innerText = winner.emoji;
      document.getElementById('winnerName').innerText = winner.name;
      
      document.getElementById('actionContainer').innerHTML = `
        <a href="https://www.google.com/maps/search/${encodeURIComponent(winner.name + ' near me')}" target="_blank" class="maps-btn" style="background:#fff; color:#333;">📍 Google Maps</a>
        <a href="https://food.grab.com/my/en/restaurants?search=${encodeURIComponent(winner.name)}" target="_blank" class="maps-btn grab-btn">🟢 GrabFood</a>
        <a href="https://www.foodpanda.my/restaurants/new?q=${encodeURIComponent(winner.name)}" target="_blank" class="maps-btn panda-btn">🐼 FoodPanda</a>
      `;

      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
      
      const duration = 3000;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 5,
          angle: 60,
          spread: 55,
          origin: { x: 0 },
          colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42']
        });
        confetti({
          particleCount: 5,
          angle: 120,
          spread: 55,
          origin: { x: 1 },
          colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42']
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      }());
    }
  </script>
</body>
</html>
