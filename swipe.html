<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Swipe</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<!-- Canvas Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  body {
    margin: 0; padding: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-height: 100vh;
    font-family: 'Poppins', sans-serif; background: #1a1a2e; color: #fff; overflow: hidden;
  }
  .card-container {
    position: relative; width: 320px; height: 420px; margin-top: 2rem;
  }
  .swipe-card {
    position: absolute; width: 100%; height: 100%;
    background: #16213e; border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s;
    user-select: none; touch-action: none; cursor: grab;
  }
  .swipe-card.dragging { transition: none; cursor: grabbing; }
  .emoji { font-size: 7rem; margin-bottom: 20px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3)); }
  .name { font-size: 2.2rem; font-weight: 800; text-align: center; padding: 0 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
  .budget { margin-top: 15px; color: #ff9a9e; font-weight: bold; font-size: 1.2rem; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 50px; }
  
  .controls { margin-top: 3rem; display: flex; gap: 40px; z-index: 10; }
  .btn-reject { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); color: white; border: none; border-radius: 50%; width: 80px; height: 80px; font-size: 2.5rem; box-shadow: 0 10px 20px rgba(231,76,60,0.4); cursor: pointer; transition: transform 0.2s; }
  .btn-accept { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: white; border: none; border-radius: 50%; width: 80px; height: 80px; font-size: 2.5rem; box-shadow: 0 10px 20px rgba(46,204,113,0.4); cursor: pointer; transition: transform 0.2s; }
  .btn-reject:active, .btn-accept:active { transform: scale(0.9); }
  
  .winner-screen { display: none; text-align: center; z-index: 20; padding: 20px; }
  .maps-btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; color: #fff; margin-top: 10px; font-size: 1.2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.3s; }
  .maps-btn:hover { transform: translateY(-3px); }
  .grab-btn { background: #00B14F; }
  .panda-btn { background: #D70F64; }
</style>
</head>
<body>
  <div id="gameUI">
    <h1 style="text-align:center; font-size:2.5rem; margin-bottom:0; color:#ff9a9e;">Swipe to Eat!</h1>
    <p style="text-align:center; color:#ccc; margin-top:5px; font-size:1.1rem;">Swipe Right 💚 to Eat, Swipe Left ❌ to Pass</p>
    
    <div class="card-container" id="cardContainer">
      <div style="text-align:center; margin-top:100px; font-size: 1.5rem;">Loading dishes... ⏳</div>
    </div>

    <div class="controls">
      <button class="btn-reject" onclick="swipeAction('left')">❌</button>
      <button class="btn-accept" onclick="swipeAction('right')">💚</button>
    </div>
  </div>

  <div id="winnerScreen" class="winner-screen">
    <h1 style="color: #ff9a9e;">Your Dinner is Served!</h1>
    <div id="winnerDetails" style="font-size: 7rem; margin: 20px 0; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));"></div>
    <div id="winnerName" style="font-size: 3.5rem; font-weight: 800; color: #ffeb3b; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);"></div>
    <br>
    <div id="actionContainer" style="display:flex; flex-direction:column; gap:15px; width: 100%; max-width: 350px; margin: 0 auto;"></div>
    <br><br>
    <a href="swipe.html" style="color: #fff; text-decoration: underline; font-size: 1.2rem;">🔄 Play Again</a>
  </div>

  <br><br>
  <a href="index.html" style="color: #ccc; text-decoration: underline; position: absolute; bottom: 20px; font-weight: 600;">🔙 Back to Wheel</a>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwMpuM0MoZvOO1SZvswjfAh7w49F1s4AnjEMDRucfOUXlHXogkwZhVCACF4ODB0hJhI/exec';
    let dishes = [];
    let currentIndex = 0;

    fetch(WEB_APP_URL, { cache: 'no-store' })
      .then(r => r.json())
      .then(data => {
        if (data && data.length > 0) {
          // Shuffle the dishes completely random
          dishes = data.sort(() => Math.random() - 0.5);
          renderCards();
        }
      });

    function renderCards() {
      const container = document.getElementById('cardContainer');
      container.innerHTML = '';
      
      // Render top 3 cards for depth illusion
      for (let i = Math.min(currentIndex + 2, dishes.length - 1); i >= currentIndex; i--) {
        const d = dishes[i];
        const card = document.createElement('div');
        card.className = 'swipe-card';
        card.id = `card-${i}`;
        card.innerHTML = `
          <div class="emoji">${d.emoji}</div>
          <div class="name">${d.name}</div>
          <div class="budget">${d.budget || '💲'}</div>
        `;
        
        if (i === currentIndex) {
          makeDraggable(card);
        } else {
          // Stack them slightly behind and smaller
          const offset = (i - currentIndex) * 15;
          card.style.transform = `scale(${1 - (i-currentIndex)*0.08}) translateY(${offset}px)`;
        }
        container.appendChild(card);
      }
      if (currentIndex >= dishes.length) {
        container.innerHTML = '<h2 style="margin-top:100px;">No more dishes! 😢<br><br><a href="swipe.html" style="color:#ff9a9e;">Restart</a></h2>';
      }
    }

    function makeDraggable(card) {
      let startX = 0, currentX = 0;
      
      const onStart = (e) => {
        startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
        card.classList.add('dragging');
      };
      
      const onMove = (e) => {
        if (!startX) return;
        currentX = (e.type.includes('mouse') ? e.pageX : e.touches[0].pageX) - startX;
        const rotate = currentX * 0.1;
        card.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;
        
        // Color tint based on direction
        if (currentX > 50) {
            card.style.background = 'linear-gradient(135deg, #16213e 0%, #27ae60 100%)';
        } else if (currentX < -50) {
            card.style.background = 'linear-gradient(135deg, #16213e 0%, #c0392b 100%)';
        } else {
            card.style.background = '#16213e';
        }
      };
      
      const onEnd = () => {
        if (!startX) return;
        card.classList.remove('dragging');
        if (currentX > 100) swipeAction('right');
        else if (currentX < -100) swipeAction('left');
        else {
          // Snap back to center
          card.style.transform = '';
          card.style.background = '#16213e';
        }
        startX = 0; currentX = 0;
      };

      card.addEventListener('mousedown', onStart);
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onEnd);
      
      card.addEventListener('touchstart', onStart);
      window.addEventListener('touchmove', onMove);
      window.addEventListener('touchend', onEnd);
    }

    function swipeAction(direction) {
      const card = document.getElementById(`card-${currentIndex}`);
      if (!card) return;
      
      card.style.transition = 'transform 0.5s, opacity 0.5s';
      if (direction === 'left') {
        card.style.transform = 'translateX(-1000px) rotate(-30deg)';
        card.style.opacity = '0';
        if (navigator.vibrate) navigator.vibrate(50); // Small haptic bump
        setTimeout(() => {
          currentIndex++;
          renderCards();
        }, 300);
      } else {
        card.style.transform = 'translateX(1000px) rotate(30deg)';
        card.style.opacity = '0';
        setTimeout(() => {
          showWinner(dishes[currentIndex]);
        }, 300);
      }
    }

    function showWinner(winner) {
      document.getElementById('gameUI').style.display = 'none';
      const wScreen = document.getElementById('winnerScreen');
      wScreen.style.display = 'block';
      
      document.getElementById('winnerDetails').innerText = winner.emoji;
      document.getElementById('winnerName').innerText = winner.name;
      
      // Delivery Links + Nearby Link
      document.getElementById('actionContainer').innerHTML = `
        <a href="https://www.google.com/maps/search/${encodeURIComponent(winner.name + ' near me')}" target="_blank" class="maps-btn" style="background:#fff; color:#333;">📍 Google Maps</a>
        <a href="https://food.grab.com/my/en/restaurants?search=${encodeURIComponent(winner.name)}" target="_blank" class="maps-btn grab-btn">🟢 GrabFood</a>
        <a href="https://www.foodpanda.my/restaurants/new?q=${encodeURIComponent(winner.name)}" target="_blank" class="maps-btn panda-btn">🐼 FoodPanda</a>
      `;

      // Haptics & Confetti
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
      
      const duration = 3000;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 5,
          angle: 60,
          spread: 55,
          origin: { x: 0 },
          colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42']
        });
        confetti({
          particleCount: 5,
          angle: 120,
          spread: 55,
          origin: { x: 1 },
          colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42']
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      }());
    }
  </script>
</body>
</html>
