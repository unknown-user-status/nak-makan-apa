<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ee7752">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #23a6d5; color: #fff; margin: 0; padding: 20px; text-align: center; }
  h1 { font-weight: 800; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
  
  .card {
    background: rgba(0,0,0,0.2);
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
    max-width: 400px;
    width: 100%;
    margin-top: 50px;
  }
  
  input { padding: 12px; font-size: 1rem; border-radius: 10px; border: none; width: 100%; margin-bottom: 15px; text-align: center; }
  button { padding: 12px 20px; font-size: 1.1rem; background: #ee7752; color: #fff; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; }
  button:hover { background: #ff8a65; }
  
  #dashboard { display: none; text-align: left; max-width: 800px; margin: 0 auto; }
  
  .review-card {
    background: #fff;
    color: #333;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  .review-title { font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
  .review-cat { font-size: 0.8rem; background: #ee7752; color: #fff; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
  .review-text { font-size: 0.95rem; line-height: 1.4; color: #555; }
  .review-empty { font-style: italic; color: #999; }
  
  a.back { color: #fff; text-decoration: underline; display: block; margin-top: 30px; }
</style>
</head>
<body>

  <!-- Login Screen -->
  <div id="loginScreen" class="card">
    <h2>🔒 Admin Access</h2>
    <p>Enter the password to view private dish reviews.</p>
    <form id="loginForm">
      <input type="password" id="adminPass" placeholder="Enter password..." required>
      <button type="submit">Unlock Dashboard</button>
    </form>
    <div id="loginError" style="color: #ffcccc; margin-top: 15px; font-weight: 600;"></div>
    <a href="index.html" class="back">Back to App</a>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard">
    <h1 style="text-align: center;">🛡️ Secret Review Dashboard</h1>
    <p style="text-align: center; margin-bottom: 30px;">Welcome back, Admin. Here are all the reviews submitted by your users.</p>
    <div id="reviewsContainer">Loading data...</div>
    <div style="text-align: center;">
      <a href="index.html" class="back" style="display: inline-block;">Log Out & Return</a>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwMpuM0MoZvOO1SZvswjfAh7w49F1s4AnjEMDRucfOUXlHXogkwZhVCACF4ODB0hJhI/exec';

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const pass = document.getElementById('adminPass').value;
      const btn = this.querySelector('button');
      const errDiv = document.getElementById('loginError');
      
      btn.innerText = 'Verifying...';
      errDiv.innerText = '';

      fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'get_admin_data', password: pass })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          errDiv.innerText = `❌ ${data.error}`;
          btn.innerText = 'Unlock Dashboard';
        } else {
          // Success! Show dashboard
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          renderDashboard(data);
        }
      })
      .catch(err => {
        errDiv.innerText = `❌ Network Error. Please ensure Apps Script is deployed.`;
        btn.innerText = 'Unlock Dashboard';
      });
    });

    function renderDashboard(data) {
      const container = document.getElementById('reviewsContainer');
      container.innerHTML = '';

      // Sort data to show items with reviews first
      data.sort((a, b) => {
        if (a.reviews && !b.reviews) return -1;
        if (!a.reviews && b.reviews) return 1;
        return 0;
      });

      data.forEach(dish => {
        let reviewsHTML = '';
        if (dish.reviews) {
          const revList = dish.reviews.split(' | ');
          reviewsHTML = revList.map(r => `<div>💬 ${r}</div>`).join('<br>');
        } else {
          reviewsHTML = `<div class="review-empty">No reviews yet.</div>`;
        }

        container.innerHTML += `
          <div class="review-card">
            <div class="review-title">
              <span>${dish.emoji} ${dish.name}</span>
              <span class="review-cat">${dish.category} | Picked: ${dish.pickCount}</span>
            </div>
            <div class="review-text">
              ${reviewsHTML}
            </div>
          </div>
        `;
      });
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
